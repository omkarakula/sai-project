<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOGIN FORM</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <style>
    * {
      margin: 0px;
      padding: 0px;
    }
   
    
  </style>
</head>

<body>
  <h1 class="text-center bg-info">User Login Form</h1>
  <div class="container-fluid">
  
  <div class="row" style="background-color: #e9e9e9;">
    <div class="col-md-6">
      <img src="https://img.freepik.com/premium-photo/woman-face-drawing_1148167-75150.jpg?semt=ais_hybrid&w=740&q=80"
        alt="" width="100%" height="489px">
    </div>
    <div class="col-md-6 mt-0;">
      <div class="row">
        <div class="col-md-6 offset-md-3">
          <form action="" method="post">
            <div class="mb-3">
              <label>Enter Name:</label>
              <input type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label>Enter Email</label>
              <input type="email" class="form-control">
            </div>
            <div class="mb-3">
              <label>Enter Password:</label>
              <input type="password" class="form-control">
            </div>
            <div class="mb-3">
              <label>Enter phone number:</label>
              <input type="tel" class="form-control">
            </div>
            <div class="mb-3">
              <input type="checkbox">I agree to the<a href="">Terms and condition</a>
            </div>
            <div class="mb-3 text-center d-grid">
              <input type="submit" class=" btn btn-success ">
            </div>
            <div class="mb-3">
              <p class="text-center">Already have an account<a href="">signup/register</a></p>
            </div>
            <div class="reg">
              <a href="https://mail.google.com/" class="btn btn-outline-danger">
                <img src="google.png" width="20"> Google
              </a>

              <a href="https://www.facebook.com/" class="btn btn-outline-primary">
                <img src="facebook (2).png" width="20"> Facebook
              </a>
            </div>
        </div>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
